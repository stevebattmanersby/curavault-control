
[functions.bootstrap_admin_auth_user]
# Production hardening: this bootstrap function must not be deployed for public production.
# If you temporarily re-enable it, require a BOOTSTRAP_SECRET, enforce owner-only invocation,
# and write a strong audit log server-side.
enabled = false
verify_jwt = true
import_map = "./functions/bootstrap_admin_auth_user/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/bootstrap_admin_auth_user/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/bootstrap_admin_auth_user/*.html" ]
